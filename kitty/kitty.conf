include Catppuccin-Mocha.conf

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME


# BEGIN_KITTY_FONTS
font_family      family="JetBrains Mono NL"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

window_margin_width 0

window_padding_width 5

hide_window_decorations titlebar-only

tab_bar_edge top

tab_bar_margin_width 5.0

tab_bar_margin_height 30.0 3.0

background_opacity 0.95

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

map cmd+ctrl+n new_tab
map cmd+ctrl+w close_tab

map cmd+ctrl+l next_tab
map cmd+ctrl+h previous_tab
map cmd+ctrl+j next_tab
map cmd+ctrl+k previous_tab
map cmd+ctrl+down next_tab
map cmd+ctrl+up previous_tab
map cmd+ctrl+right next_tab
map cmd+ctrl+left previous_tab

map cmd+shift+n new_os_window_with_cwd
map cmd+shift+m new_os_window

enabled_layouts tall:bias=50;full_size=1;mirrored=false

